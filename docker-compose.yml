services:
  db:
    image: postgres:16-alpine
    container_name: qrcode-dynamic-db
    environment:
      - POSTGRES_USER=docker
      - POSTGRES_PASSWORD=docker
      - POSTGRES_DB=qrcode_dynamic
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docker -d qrcode_dynamic"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qrcode-dynamic-app
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgresql://docker:docker@db:5432/qrcode_dynamic
      - NODE_ENV=production
      - NEXTAUTH_SECRET=change-me-in-production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./public/uploads:/app/public/uploads
    restart: unless-stopped

volumes:
  postgres-data:
